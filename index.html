<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HYROX 21W · 12.5</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --ink:#12130F; --paper:#EDEAE3; --card:#F7F5F0; --line:#D5D1C7; --mute:#6E6B62;
    --run:#2E5C4D; --lift:#8A3D2E; --move:#4A5568; --rest:#A9A498; --hot:#C2410C; --ok:#2E5C4D;
    --lulu:#8A3D2E; --yelu:#2E5C4D;
  }
  body{background:var(--paper);color:var(--ink);
    font-family:ui-sans-serif,-apple-system,"Segoe UI","PingFang SC","Hiragino Sans GB",sans-serif;
    font-size:17px;line-height:1.6;padding:22px 16px 80px}
  .wrap{max-width:1100px;margin:0 auto}

  header{border-bottom:2px solid var(--ink);padding-bottom:18px;margin-bottom:20px}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .eyebrow{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--mute);font-weight:700}
  h1{font-size:clamp(32px,5.5vw,48px);font-weight:800;letter-spacing:-.02em;line-height:1.05;margin:8px 0 10px}
  .sub{color:var(--mute);font-size:16px}
  .lang{display:flex;gap:0;border:1px solid var(--line);border-radius:999px;overflow:hidden;flex-shrink:0}
  .lang button{background:none;border:none;padding:8px 16px;font:inherit;font-size:14px;font-weight:700;cursor:pointer;color:var(--mute)}
  .lang button.on{background:var(--ink);color:var(--paper)}

  .who{display:flex;gap:8px;margin-top:16px;align-items:center;flex-wrap:wrap}
  .who .lb{font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mute)}
  .who button{background:var(--card);border:2px solid var(--line);border-radius:999px;padding:8px 20px;font:inherit;font-size:16px;font-weight:700;cursor:pointer;color:var(--mute)}
  .who button.on{background:#fff;color:var(--ink)}
  .who button[data-p="lulu"].on{border-color:var(--lulu);color:var(--lulu)}
  .who button[data-p="yelu"].on{border-color:var(--yelu);color:var(--yelu)}

  .countdown{display:flex;gap:26px;flex-wrap:wrap;margin-top:16px}
  .cd b{display:block;font-size:30px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
  .cd span{font-size:13px;color:var(--mute);letter-spacing:.06em;text-transform:uppercase}

  nav{display:flex;gap:5px;margin:22px 0;flex-wrap:wrap}
  nav>button{background:none;border:1px solid var(--line);border-radius:999px;padding:9px 18px;font:inherit;font-size:15px;font-weight:700;cursor:pointer;color:var(--mute)}
  nav>button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}

  .zones{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:11px;margin-bottom:18px}
  .z{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
  .z .t{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--mute);font-weight:700}
  .z .v{font-size:23px;font-weight:800;margin-top:4px;font-variant-numeric:tabular-nums}
  .z .n{font-size:14px;color:var(--mute);margin-top:3px}

  .blockbar{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap}
  .bb{flex:1;min-width:150px;background:var(--card);border:1px solid var(--line);border-left:4px solid var(--line);border-radius:8px;padding:11px 14px}
  .bb.cur{border-left-color:var(--hot);background:#fff}
  .bb .k{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--mute);font-weight:700}
  .bb .l{font-size:16px;font-weight:800;margin-top:3px}
  .bb .d{font-size:13px;color:var(--mute);line-height:1.4}

  .week{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden}
  .week.now{border-color:var(--hot);border-width:2px}
  .whead{display:flex;align-items:center;gap:13px;padding:14px 17px;cursor:pointer;user-select:none}
  .whead:hover{background:#fff}
  .wno{font-size:24px;font-weight:800;min-width:38px;font-variant-numeric:tabular-nums}
  .wmeta{flex:1;min-width:0}
  .wmeta .a{font-size:16px;font-weight:800}
  .wmeta .b{font-size:13px;color:var(--mute)}
  .wtag{font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:3px 9px;border-radius:999px;background:var(--line);white-space:nowrap}
  .wtag.hot{background:var(--hot);color:#fff}
  .prog{font-size:14px;color:var(--mute);font-variant-numeric:tabular-nums;white-space:nowrap;font-weight:700}
  .wbody{display:none;border-top:1px solid var(--line)}
  .week.open .wbody{display:block}

  .day{display:flex;gap:13px;padding:14px 17px;border-bottom:1px solid var(--line);align-items:flex-start}
  .day:last-child{border-bottom:none}
  .day.done{background:#fff}
  .day.rest{opacity:.6}
  .cbx{width:23px;height:23px;flex-shrink:0;margin-top:3px;cursor:pointer;accent-color:var(--ink)}
  .dmain{flex:1;min-width:0}
  .dtop{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .ddate{font-size:13px;color:var(--mute);font-weight:700;font-variant-numeric:tabular-nums}
  .dtype{font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:4px;color:#fff}
  .t-run{background:var(--run)} .t-lift{background:var(--lift)} .t-move{background:var(--move)} .t-rest{background:var(--rest)}
  .dttl{font-size:17px;font-weight:800;margin-top:6px}
  .dttl.done{text-decoration:line-through;color:var(--mute)}
  .ddet{font-size:16px;color:#33322D;margin-top:8px;line-height:1.7;letter-spacing:.01em}

  /* per-exercise cards */
  .items{margin-top:12px}
  .ex{border-top:1px solid var(--line);padding:11px 0}
  .ex:first-child{border-top:none;padding-top:4px}
  .exhead{display:flex;align-items:center;gap:10px}
  .icbx{width:21px;height:21px;flex-shrink:0;cursor:pointer;accent-color:var(--ok)}
  .exn{flex:1;font-size:17px;font-weight:700;cursor:pointer;line-height:1.35}
  .ex.exdone .exn{text-decoration:line-through;color:var(--mute)}
  .tipbtn{flex-shrink:0;width:26px;height:26px;border:1px solid var(--line);background:none;border-radius:6px;
    font:inherit;font-size:15px;font-weight:700;color:var(--mute);cursor:pointer;line-height:1;padding:0}
  .tipbtn:hover{border-color:var(--ink);color:var(--ink)}
  .tipbtn.cam{font-size:13px}
  .extgt{font-size:15px;color:var(--mute);margin:3px 0 0 31px;font-variant-numeric:tabular-nums}
  .extip{display:none;font-size:14px;line-height:1.6;color:#41403A;margin:8px 0 0 31px;
    padding:9px 12px;background:#fff;border-left:3px solid var(--line);border-radius:0 7px 7px 0}
  .ex.showtip .extip{display:block}
  .exf{display:flex;gap:7px;flex-wrap:wrap;margin:9px 0 0 31px;opacity:.55}
  .exf.on,.ex:hover .exf,.ex.exdone .exf{opacity:1}
  .fchip{display:flex;align-items:center;gap:5px;background:#fff;border:1px solid var(--line);
    border-radius:7px;padding:4px 8px}
  .fchip span{font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--mute);white-space:nowrap}
  .fchip input,.fchip select{width:62px;border:none;background:none;padding:2px 0;font:inherit;font-size:15px;
    font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
  .fchip select{width:auto;max-width:96px}
  .fchip input:focus,.fchip select:focus{outline:none}
  .ied{font-size:10px;font-weight:800;background:var(--line);color:var(--ink);padding:1px 5px;border-radius:3px;margin-left:6px;vertical-align:2px}
  .iprog{font-size:12px;font-weight:800;color:var(--mute);font-variant-numeric:tabular-nums;margin-left:auto}
  .iprog.full{color:var(--ok)}
  @media(max-width:560px){.extgt,.extip,.exf{margin-left:0}.fchip input{width:52px}}
  .dwhy{font-size:14px;color:var(--mute);margin-top:7px;padding-left:11px;border-left:2px solid var(--line);line-height:1.45}
  .logbtn{background:none;border:1px solid var(--line);border-radius:7px;padding:6px 12px;font:inherit;font-size:14px;font-weight:700;cursor:pointer;color:var(--mute);white-space:nowrap;margin-top:2px}
  .logbtn:hover{border-color:var(--ink);color:var(--ink)}
  .logbtn.has{border-color:var(--ok);color:var(--ok);background:#fff}
  .logs{margin-top:8px;display:flex;flex-direction:column;gap:5px}
  .lg{font-size:14px;background:#fff;border:1px solid var(--line);border-left:3px solid var(--line);border-radius:6px;padding:7px 11px;font-variant-numeric:tabular-nums}
  .lg.lulu{border-left-color:var(--lulu)}
  .lg.yelu{border-left-color:var(--yelu)}
  .lg .nm{font-weight:800;font-size:12px;letter-spacing:.05em;text-transform:uppercase;margin-right:7px}
  .lg.lulu .nm{color:var(--lulu)} .lg.yelu .nm{color:var(--yelu)}
  .lg .fb{color:var(--mute);font-style:italic;margin-top:3px;font-size:14px}

  .mask{position:fixed;inset:0;background:rgba(18,19,15,.55);display:none;align-items:center;justify-content:center;padding:16px;z-index:50}
  .mask.on{display:flex}
  .modal{background:var(--paper);border-radius:14px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;padding:24px}
  .modal h3{font-size:21px;font-weight:800;margin-bottom:4px}
  .modal .ms{font-size:14px;color:var(--mute);margin-bottom:16px}
  .drop{border:2px dashed var(--line);border-radius:10px;padding:22px;text-align:center;cursor:pointer;margin-bottom:16px;background:var(--card)}
  .drop:hover{border-color:var(--ink)}
  .drop.busy{opacity:.6;pointer-events:none}
  .drop .d1{font-size:16px;font-weight:800}
  .drop .d2{font-size:13px;color:var(--mute);margin-top:4px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  label{display:block;font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--mute);margin-bottom:5px}
  input,textarea,select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:7px;font:inherit;font-size:17px;background:#fff;color:var(--ink)}
  textarea{resize:vertical;min-height:64px}
  .fld{margin-bottom:12px}
  .acts{display:flex;gap:9px;margin-top:18px}
  .btn{flex:1;padding:12px;border:1px solid var(--ink);border-radius:8px;font:inherit;font-size:16px;font-weight:800;cursor:pointer;background:none;color:var(--ink)}
  .btn.pri{background:var(--ink);color:var(--paper)}
  .btn.del{flex:0 0 auto;padding:12px 16px;border-color:var(--line);color:var(--mute)}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:22px;margin-bottom:14px}
  .panel h2{font-size:21px;font-weight:800;margin-bottom:5px}
  .panel .ps{font-size:15px;color:var(--mute);margin-bottom:15px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(125px,1fr));gap:11px;margin-bottom:16px}
  .st{background:#fff;border:1px solid var(--line);border-radius:9px;padding:13px 15px}
  .st b{display:block;font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.1}
  .st span{font-size:13px;color:var(--mute)}
  .out{background:#fff;border:1px solid var(--line);border-radius:9px;padding:18px;font-size:16px;white-space:pre-wrap;line-height:1.7;margin-top:15px}

  /* full-screen busy overlay — the page must never look frozen */
  .busy{position:fixed;inset:0;background:rgba(18,19,15,.72);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;z-index:200;padding:24px}
  .busy.on{display:flex}
  .busycard{background:var(--paper);border-radius:16px;padding:30px 34px;text-align:center;
    max-width:340px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .orb{display:flex;gap:9px;justify-content:center;margin-bottom:18px}
  .orb span{width:12px;height:12px;border-radius:50%;background:var(--ink);
    animation:bounce 1.1s ease-in-out infinite}
  .orb span:nth-child(2){animation-delay:.15s;background:var(--lulu)}
  .orb span:nth-child(3){animation-delay:.3s;background:var(--yelu)}
  @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.35}
    40%{transform:translateY(-11px);opacity:1}}
  .busyt{font-size:18px;font-weight:800;letter-spacing:-.01em}
  .busys{font-size:14px;color:var(--mute);margin-top:5px;min-height:20px}
  .bar{height:4px;background:var(--line);border-radius:99px;margin-top:16px;overflow:hidden}
  .barf{height:100%;width:0;background:var(--ink);border-radius:99px;transition:width .35s ease}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--ink);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:7px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .hide{display:none}
  .sync{margin-top:13px;font-size:13px;font-weight:700;color:var(--mute)}
  .sync.good{color:var(--ok)}
  .sync.bad{color:var(--hot)}
  .note{font-size:14px;color:var(--mute);background:var(--card);border-left:3px solid var(--line);padding:11px 14px;border-radius:0 7px 7px 0;margin-top:13px;line-height:1.55}

  /* rationale */
  .why{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:22px;margin-bottom:13px}
  .why .n{font-size:13px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--hot)}
  .why h3{font-size:22px;font-weight:800;margin:5px 0 10px;letter-spacing:-.01em;line-height:1.25}
  .why p{font-size:16px;line-height:1.65;margin-bottom:11px}
  .why .cite{font-size:14px;color:var(--mute);border-top:1px solid var(--line);padding-top:11px;margin-top:13px;line-height:1.5}
  .why .cite b{color:var(--ink)}
  .warn{background:#fff;border:1px solid var(--hot);border-left:4px solid var(--hot);border-radius:0 8px 8px 0;padding:13px 16px;margin:13px 0;font-size:15px;line-height:1.6}
  @media(max-width:560px){.grid2{grid-template-columns:1fr}.day{flex-wrap:wrap}body{font-size:16px}}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="topbar">
    <div>
      <div class="eyebrow" data-i="eyebrow"></div>
      <h1 data-i="h1"></h1>
      <div class="sub" data-i="sub"></div>
    </div>
    <div class="lang">
      <button data-l="zh" class="on">中文</button>
      <button data-l="en">EN</button>
    </div>
  </div>

  <div class="who">
    <span class="lb" data-i="who"></span>
    <button data-p="lulu" class="on">Lulu</button>
    <button data-p="yelu">Ye Lu</button>
  </div>

  <div class="countdown">
    <div class="cd"><b id="cd-w">—</b><span data-i="cdw"></span></div>
    <div class="cd"><b id="cd-d">—</b><span data-i="cdd"></span></div>
    <div class="cd"><b id="cd-done">—</b><span data-i="cdn"></span></div>
    <div class="cd"><b id="cd-rate">—</b><span data-i="cdr"></span></div>
  </div>
  <div id="sync" class="sync">—</div>
</header>

<nav>
  <button class="on" data-v="plan" data-i="tab1"></button>
  <button data-v="zones" data-i="tab2"></button>
  <button data-v="food" data-i="tab5"></button>
  <button data-v="why" data-i="tab3"></button>
  <button data-v="ai" data-i="tab4"></button>
</nav>

<section id="v-plan">
  <div class="blockbar" id="blockbar"></div>
  <div id="weeks"></div>
</section>

<section id="v-zones" class="hide"></section>
<section id="v-food" class="hide"></section>
<section id="v-why" class="hide"></section>

<section id="v-ai" class="hide">
  <div class="panel">
    <h2 data-i="aih"></h2>
    <div class="ps" data-i="ais"></div>
    <div class="stats" id="stats"></div>
    <div class="acts" style="margin-top:0">
      <button class="btn pri" id="run-ai" data-i="aibtn"></button>
    </div>
    <div id="ai-out" class="hide"></div>
    <div class="note" data-i="ainote"></div>
  </div>
</section>

</div>

<div class="busy" id="busy">
  <div class="busycard">
    <div class="orb"><span></span><span></span><span></span></div>
    <div class="busyt" id="busy-t"></div>
    <div class="busys" id="busy-s"></div>
    <div class="bar"><div class="barf" id="busy-bar"></div></div>
  </div>
</div>
<input type="file" id="exshot" accept="image/*" multiple style="display:none">
<div class="mask" id="mask">
  <div class="modal">
    <h3 id="m-t"></h3>
    <div class="ms" id="m-s"></div>
    <div class="drop" id="drop">
      <input type="file" id="file" accept="image/*" multiple style="display:none">
      <div class="d1" id="drop-t"></div>
      <div class="d2" id="drop-s"></div>
    </div>
    <div class="grid2">
      <div class="fld"><label data-i="fkm"></label><input id="f-km" type="number" step="0.01" placeholder="3.81"></div>
      <div class="fld"><label data-i="fmin"></label><input id="f-min" type="number" step="0.1" placeholder="24.3"></div>
    </div>
    <div class="grid2">
      <div class="fld"><label data-i="fpace"></label><input id="f-pace" placeholder="6'22&quot;"></div>
      <div class="fld"><label data-i="fhr"></label><input id="f-hr" type="number" placeholder="153"></div>
    </div>
    <div class="fld"><label data-i="fload"></label><input id="f-load" placeholder="Squat 4×5 @ 50kg"></div>
    <div class="fld"><label data-i="frpe"></label><select id="f-rpe"></select></div>
    <div class="fld"><label data-i="fnote"></label><textarea id="f-note"></textarea></div>
    <div class="acts">
      <button class="btn del" id="m-del" data-i="bdel"></button>
      <button class="btn" id="m-x" data-i="bcx"></button>
      <button class="btn pri" id="m-ok" data-i="bok"></button>
    </div>
  </div>
</div>


<div class="mask" id="fmask">
  <div class="modal">
    <h3 id="fm-t">记录饮食</h3>
    <div class="ms" id="fm-s"></div>
    <div class="drop" id="fdrop">
      <input type="file" id="ffile" accept="image/*" multiple style="display:none">
      <div class="d1" id="fdrop-t">📸 拍下这餐,自动估算营养</div>
      <div class="d2" id="fdrop-s">点击选择食物照片</div>
    </div>
    <div class="fld"><label id="fl-desc">吃了什么</label><textarea id="n-desc" placeholder="1碗米饭 + 三文鱼 150g + 西兰花"></textarea></div>
    <div class="grid2">
      <div class="fld"><label id="fl-kcal">热量 kcal</label><input id="n-kcal" type="number" placeholder="650"></div>
      <div class="fld"><label id="fl-carb">碳水 g</label><input id="n-carb" type="number" placeholder="85"></div>
    </div>
    <div class="grid2">
      <div class="fld"><label id="fl-pro">蛋白质 g</label><input id="n-pro" type="number" placeholder="35"></div>
      <div class="fld"><label id="fl-fat">脂肪 g</label><input id="n-fat" type="number" placeholder="18"></div>
    </div>
    <div class="acts">
      <button class="btn del" id="fm-del">删除</button>
      <button class="btn" id="fm-x">取消</button>
      <button class="btn pri" id="fm-ok">保存</button>
    </div>
  </div>
</div>

<script>
const API='/.netlify/functions/claude';
const RACE=new Date(2026,11,5), START=new Date(2026,6,13);
let LANG='zh', ME='lulu';
const NAMES={lulu:'Lulu',yelu:'Ye Lu'};

/* ---------- shared cloud storage (Netlify Blobs) ---------- */
const DATA_API='/api/data';
let DB=normalise(null);
let syncState='ok';

/* Old saved data may predate newer fields. Always fill in what's missing,
   so a schema change can never blank the page. */
function normalise(d){
  d=d||{};
  return {
    done : d.done  && typeof d.done  === 'object' ? d.done  : {},
    logs : d.logs  && typeof d.logs  === 'object' ? d.logs  : {},
    items: d.items && typeof d.items === 'object' ? d.items : {},
    ex   : d.ex    && typeof d.ex    === 'object' ? d.ex    : {},
    edits: d.edits && typeof d.edits === 'object' ? d.edits : {},
    meals: d.meals && typeof d.meals === 'object' ? d.meals : {}
  };
}

async function load(){
  try{
    const r=await fetch(DATA_API,{cache:'no-store'});
    if(!r.ok)throw new Error('http '+r.status);
    const d=await r.json();
    DB=normalise(d);
    syncState='ok';
  }catch(e){
    syncState='err';
    // Fall back to a local copy so a network blip doesn't look like data loss.
    try{const l=localStorage.getItem('hyrox_backup');if(l)DB=normalise(JSON.parse(l));}catch(_){}
  }
  paintSync();
}

let saveTimer=null,saving=false;
async function persist(){
  // Optimistic local backup first, so nothing is ever lost mid-flight.
  try{localStorage.setItem('hyrox_backup',JSON.stringify(DB));}catch(_){}
  syncState='saving';paintSync();
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    if(saving)return;saving=true;
    try{
      const r=await fetch(DATA_API,{method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(DB)});
      if(!r.ok)throw new Error('http '+r.status);
      syncState='ok';
    }catch(e){syncState='err';}
    saving=false;paintSync();
  },500);
}

function paintSync(){
  const el=document.getElementById('sync');if(!el)return;
  const zh=LANG==='zh';
  if(syncState==='saving'){el.textContent=zh?'保存中…':'Saving…';el.className='sync';}
  else if(syncState==='err'){el.textContent=zh?'⚠ 云端未连接 — 已存本地':'⚠ Offline — saved locally';el.className='sync bad';}
  else{el.textContent=zh?'✓ 已同步(与搭档共享)':'✓ Synced (shared with partner)';el.className='sync good';}
}

const PLAN=[];

  const dl=[4,8,14,20].includes(w);
  let mon,fri,sat;

  if(w<=4)mon=easy(w<=2?30:35);
  else if(w<=10)mon=easy(35);

  else if(w<=19)mon=easy(35);
  else if(w===20)mon=easy(25);
  else mon={
    zh:{t:'赛前 · 轻松抖动',ex:[{n:'抖动跑',k:'run',tgt:'20分钟 · 二区以下',tip:'拉伸、松动、别练新东西。储备,不是消耗。'}],why:'储备,不是消耗。'},

  };

  if(w<=4)fri=easy(w<=2?35:40,{zh:'这一块不做强度 — 先把连续性建起来。',en:'No intensity this block — build consistency first.'});
  else fri=T[w];

  if(w<=4)sat=long(w<=2?45:55);
  else if(w<=10)sat=long(dl?40:60);

  else if(w<=19)sat=sim;
  else if(w===20)sat={
    zh:{t:'减量 · 短轻松跑',ex:[
      {n:'轻松跑',k:'run',tgt:'30分钟 · 二区',tip:''},

    ],why:'减量周。别练新东西。'},

      {n:'Easy run',k:'run',tgt:'30 min · Z2',tip:''},

const dateOf=(w,d)=>{const x=new Date(START);x.setDate(x.getDate()+(w-1)*7+d);return x;};
const fmt=x=>LANG==='zh'?`${x.getMonth()+1}月${x.getDate()}日`:`${x.getDate()} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][x.getMonth()]}`;
const curWeek=()=>{const t=new Date();t.setHours(0,0,0,0);return Math.max(1,Math.min(21,Math.floor((t-START)/864e5/7)+1));};

/* ---------- render ---------- */
function render(){
  document.querySelectorAll('[data-i]').forEach(el=>{const v=t(el.dataset.i);if(typeof v==='string')el.textContent=v;});
  document.getElementById('f-rpe').innerHTML=t('rpe').map(r=>`<option>${r}</option>`).join('');
  document.getElementById('drop-t').textContent=t('dropT');
  document.getElementById('drop-s').textContent=t('dropS');

  const cw=curWeek(),now=new Date();now.setHours(0,0,0,0);
  const days=Math.max(0,Math.ceil((RACE-now)/864e5));
  document.getElementById('cd-d').textContent=days;
  document.getElementById('cd-w').textContent=Math.ceil(days/7);
  let mine=0;
  for(let w=1;w<=21;w++)for(let i=0;i<7;i++){
    const it=itemsFor(w,i);
    if(!it.length)continue;
    if(it.every((_,x)=>DB.items[`${ME}|${w}-${i}|${x}`]))mine++;
  }
  document.getElementById('cd-done').textContent=mine;
  document.getElementById('cd-rate').textContent=Math.round(mine/(21*6)*100)+'%';

  document.getElementById('blockbar').innerHTML=BLOCKS.map(b=>{
    const on=cw>=b.w[0]&&cw<=b.w[1],x=b[LANG];
    return `<div class="bb ${on?'cur':''}"><div class="k">${x[0]} · W${b.w[0]}–${b.w[1]}</div><div class="l">${x[1]}</div><div class="d">${x[2]}</div></div>`;
  }).join('');

  document.getElementById('weeks').innerHTML=PLAN.map(wk=>{
    const b=blockOf(wk.w)[LANG],isNow=wk.w===cw;
    const n=wk.days.filter((_,i)=>{
      const it=itemsFor(wk.w,i);
      if(!it.length)return !!DB.done[`${ME}|${wk.w}-${i}`];
      return it.every((_,x)=>DB.items[`${ME}|${wk.w}-${i}|${x}`]);
    }).length;
    const rows=wk.days.map((d,i)=>{
      const key=`${wk.w}-${i}`,id=`${ME}|${key}`;
      const x=d[LANG]||{},rest=d.k==='rest';
      const items=exFor(wk.w,i);
      const total=items.length;
      const dn=items.filter((_,n)=>DB.items[`${ME}|${key}|${n}`]).length;
      const ok=total?dn===total:!!DB.done[id];
      const both=['lulu','yelu'].map(p=>{const l=DB.logs[`${p}|${key}`];
        return l?`<div class="lg ${p}"><span class="nm">${NAMES[p]}</span>${lgTxt(l)}${l.note?`<div class="fb">${l.note}</div>`:''}</div>`:'';}).join('');
      return `<div class="day ${ok?'done':''} ${rest?'rest':''}">
        <div class="dmain">
          <div class="dtop">
            <span class="dtype t-${d.k}">${t('wd')[i]} · ${t('klbl')[d.k]}</span>
            <span class="ddate">${fmt(dateOf(wk.w,i))}</span>
            ${total?`<span class="iprog ${ok?'full':''}">${dn}/${total}</span>`:''}
          </div>
          <div class="dttl ${ok?'done':''}">${x.t||''}</div>
          ${renderItems(wk.w,i)}
          ${x.why?`<div class="dwhy">${x.why}</div>`:''}
          ${both?`<div class="logs">${both}</div>`:''}
          ${!rest?`<button class="logbtn ${DB.logs[id]?'has':''}" onclick="openLog('${key}')">${DB.logs[id]?'✎ 编辑记录':'+ 记录数据'}</button>`:''}
        </div>
      </div>`;
    }).join('');
    return `<div class="week ${isNow?'open now':''}" id="wk${wk.w}">
      <div class="whead" onclick="this.parentElement.classList.toggle('open')">
        <div class="wno">${wk.w}</div>
        <div class="wmeta"><div class="a">${b[1]}${wk.dl?' · '+t('deload'):''}${wk.w===21?' · '+t('raceweek'):''}</div>
        <div class="b">${fmt(dateOf(wk.w,0))} – ${fmt(dateOf(wk.w,6))}</div></div>
        ${isNow?`<span class="wtag hot">${t('thisweek')}</span>`:''}
        <span class="prog">${n}/6</span>
      </div><div class="wbody">${rows}</div></div>`;
  }).join('');

  renderZones();renderWhy();renderStats();renderFood();paintSync();
}


/* Turn plain session text into readable blocks: headings bold, bullets indented. */
/* Exercises for a day, with any edits the athlete made applied on top. */
const itemsFor=(w,i)=>exFor(w,i);
function exFor(w,i){
  const d=PLAN[w-1].days[i];
  const base=(d[LANG]&&d[LANG].ex)||[];
  const ed=(DB.edits&&DB.edits[`${w}-${i}`])||{};
  return base.map((e,n)=>({...e, tgt: ed[n]!==undefined?ed[n]:e.tgt, edited: ed[n]!==undefined}));
}

/* One tickable exercise, with its own log fields and a collapsible note. */
function renderEx(w,i,e,n){
  const key=`${w}-${i}`;
  const id=`${ME}|${key}|${n}`;
  const done=!!DB.items[id];
  const d=DB.ex[id]||{};
  const zh=LANG==='zh';

  // Which fields to show depends on the exercise type.
  const f =
    e.k==='int' ?
      // Short reps: HR lags 20s efforts, so peak + 1-min recovery is what's real.
      [['reps',zh?'组数':'Reps','6'],['pace',zh?'配速':'Pace',"5'40\""],
       ['hrmax',zh?'峰值心率':'Peak HR','147'],['hrrec',zh?'1分恢复':'1min rec','114'],
       ['spm',zh?'步频':'Cad','spm']]
  : e.k==='run' ?
      [['dist',zh?'距离':'Dist','km'],['min',zh?'时间':'Time',zh?'分':'min'],
       ['pace',zh?'配速':'Pace',"6'30\""],['hr',zh?'心率':'HR','bpm'],
       ['spm',zh?'步频':'Cad','spm']]
  :   [['sets',zh?'组数':'Sets','4'],['reps',zh?'次数':'Reps','5'],['kg',zh?'重量':'Load','kg']];

  const filled=f.some(([k])=>d[k])||d.rpe;
  const chips=f.map(([k,lb,ph])=>
    `<label class="fchip"><span>${lb}</span><input value="${d[k]||''}" placeholder="${ph}"
      onchange="setEx('${key}',${n},'${k}',this.value)"></label>`).join('');

  const rpes=zh?['','很轻松','轻松','刚好','偏累','很吃力']:['','Very easy','Easy','Just right','Hard','Very hard'];
  const rpe=`<label class="fchip"><span>${zh?'感受':'RPE'}</span><select onchange="setEx('${key}',${n},'rpe',this.value)">
    ${rpes.map(r=>`<option ${d.rpe===r?'selected':''}>${r}</option>`).join('')}</select></label>`;

  return `<div class="ex ${done?'exdone':''}">
    <div class="exhead">
      <input type="checkbox" class="icbx" ${done?'checked':''} onchange="togItem('${key}',${n})">
      <span class="exn" onclick="editItem('${key}',${n})">${e.n}${e.edited?`<span class="ied">${zh?'已改':'edited'}</span>`:''}</span>
      ${(e.k==='run'||e.k==='int')?`<button class="tipbtn cam" onclick="shotFor('${key}',${n})" title="${zh?'上传手表截图':'Upload watch screenshot'}">📷</button>`:''}
      ${e.tip?`<button class="tipbtn" onclick="this.parentElement.parentElement.classList.toggle('showtip')">＋</button>`:''}
    </div>
    <div class="extgt">${e.tgt}</div>
    ${e.tip?`<div class="extip">${e.tip}</div>`:''}
    <div class="exf ${filled?'on':''}">${chips}${rpe}</div>
  </div>`;
}

function renderItems(w,i){
  const ex=exFor(w,i);
  if(!ex.length)return '';
  return `<div class="items">${ex.map((e,n)=>renderEx(w,i,e,n)).join('')}</div>`;
}

function lgTxt(l){const p=[];
  if(l.km)p.push(l.km+' km');if(l.pace)p.push(l.pace);
  if(l.hr)p.push((LANG==='zh'?'心率 ':'HR ')+l.hr);
  if(l.min)p.push(l.min+(LANG==='zh'?' 分':' min'));
  if(l.load)p.push(l.load);if(l.rpe&&l.rpe!=='—')p.push(l.rpe);
  return p.join(' · ')||'✓';}

async function tog(key){const id=`${ME}|${key}`;DB.done[id]=!DB.done[id];await persist();render();}



/* Busy overlay. Any slow AI call must show this — never a frozen screen. */
function busyOn(title,sub){
  document.getElementById('busy-t').textContent=title||'';
  document.getElementById('busy-s').textContent=sub||'';
  document.getElementById('busy-bar').style.width='8%';
  document.getElementById('busy').classList.add('on');
}
function busyStep(pct,sub){
  document.getElementById('busy-bar').style.width=Math.min(99,pct)+'%';
  if(sub!==undefined)document.getElementById('busy-s').textContent=sub;
}
function busyOff(){
  document.getElementById('busy-bar').style.width='100%';
  setTimeout(()=>document.getElementById('busy').classList.remove('on'),260);
}

/* Upload a watch screenshot directly onto one exercise. */
let shotTarget=null;
function shotFor(key,n){
  shotTarget={key,n};
  document.getElementById('exshot').click();
}
document.getElementById('exshot').onchange=async e=>{
  const files=[...e.target.files];
  if(!files.length||!shotTarget)return;
  const {key,n}=shotTarget;
  const zh=LANG==='zh';
  const id=`${ME}|${key}|${n}`;
  busyOn(zh?'正在读取截图':'Reading screenshot', zh?'准备图片…':'Preparing image…');
  const got={};let err='';
  let fi=0;
  for(const f of files){
    fi++;
    try{
      busyStep(15+((fi-1)/files.length)*70, zh?`压缩第 ${fi}/${files.length} 张…`:`Compressing ${fi}/${files.length}…`);
      const b64=await toJpeg(f);
      busyStep(25+((fi-1)/files.length)*70, zh?`AI 正在识别第 ${fi}/${files.length} 张…`:`AI reading ${fi}/${files.length}…`);
      const o=await askClaude(b64,`Screenshot from a running watch or fitness app (Apple Fitness, COROS, Garmin).
Return ONLY raw JSON, no markdown, no commentary:
{"km":"4.03","min":"30.6","pace":"7'35\"","hr":"139","spm":"154","hrmax":"147","hrrec":"114"}

Rules:
- km  = distance in kilometres, number only
- min = duration in MINUTES as a decimal (30:35 -> "30.6")
- pace = AVERAGE pace, format like 7'35"
- hr  = AVERAGE heart rate ("Avg. Heart Rate"), number only
- spm = AVERAGE CADENCE in steps per minute ("Cadence" / "步频"), number only
- hrmax = the PEAK heart rate. IMPORTANT: read this from the HEART RATE CHART itself — the highest number printed on the chart axis (e.g. "147" at the top right of the graph). Do NOT use the zone table.
- hrrec = the "1 min." value under "Post-Workout Heart Rate" / recovery — the heart rate one minute after finishing (e.g. "114").

CRITICAL: Ignore the "Zone 1 / Zone 2 / Zone 3..." table entirely. Those zone boundaries are the watch's own settings and are WRONG for this athlete. Only read actual measured numbers.
Use "" for anything you genuinely cannot read. JSON only.`);
      ['km','min','pace','hr','spm','hrmax','hrrec'].forEach(k=>{if(o[k]&&!got[k])got[k]=o[k];});
    }catch(x){err=x.message||String(x);}
  }
  e.target.value='';shotTarget=null;
  if(Object.keys(got).length){
    DB.ex[id]=DB.ex[id]||{};
    const map={km:'dist',min:'min',pace:'pace',hr:'hr',spm:'spm',hrmax:'hrmax',hrrec:'hrrec'};
    Object.entries(map).forEach(([f,t])=>{if(got[f])DB.ex[id][t]=got[f];});
    DB.items[id]=true;
    busyStep(95, zh?'保存中…':'Saving…');
    await persist();render();
    busyOff();
    const banner=document.getElementById('sync');
    const b=[];
    if(got.km)b.push(got.km+'km');
    if(got.pace)b.push(got.pace);
    if(got.hr)b.push((zh?'心率':'HR')+got.hr);
    if(got.hrmax)b.push((zh?'峰值':'peak')+got.hrmax);
    if(got.hrrec)b.push((zh?'恢复':'rec')+got.hrrec);
    if(got.spm)b.push((zh?'步频':'cad')+got.spm);
    banner.textContent='✓ '+b.join(' · ');banner.className='sync good';
    setTimeout(paintSync,4000);
  }else{
    busyOff();
    const banner=document.getElementById('sync');
    banner.textContent=(zh?'✕ 读不出来':'✕ Could not read')+(err?' — '+err:'');
    banner.className='sync bad';
    setTimeout(paintSync,5000);
  }
};

/* Save one field of one exercise. */
async function setEx(key,n,f,v){
  const id=`${ME}|${key}|${n}`;
  DB.ex[id]=DB.ex[id]||{};
  if(v&&v.trim())DB.ex[id][f]=v.trim(); else delete DB.ex[id][f];
  if(!Object.keys(DB.ex[id]).length)delete DB.ex[id];
  await persist();
  // Don't re-render: it would blur the field the athlete is typing in.
}

/* Tick a single exercise. */
async function togItem(key,n){
  const id=`${ME}|${key}|${n}`;
  DB.items[id]=!DB.items[id];
  await persist();render();
}

/* Tap an exercise to change it — weights, sets, whatever you actually did.
   The edit sticks; it is not overwritten by the original plan. */
async function editItem(key,n){
  const [w,i]=key.split('-').map(Number);
  const cur=exFor(w,i)[n];
  const zh=LANG==='zh';
  const v=prompt(zh?`${cur.n} — 改成:\n清空并确定 = 恢复原计划`:`${cur.n} — change to:\n(empty = restore original)`,cur.tgt);
  if(v===null)return;
  DB.edits[key]=DB.edits[key]||{};
  if(v.trim()===''){delete DB.edits[key][n];}
  else{DB.edits[key][n]=v.trim();}
  if(!Object.keys(DB.edits[key]).length)delete DB.edits[key];
  await persist();render();
}

const WHY=[
 {n:{zh:'诊断',en:'The diagnosis'},h:{zh:'你的问题不是"80/20",是"100/0"',en:'Your problem isn\'t 80/20 — it\'s 100/0'},
  p:{zh:`2025年2月的半马数据说明了一切:配速 7'11"/km,平均心率 158 —— 那是你实测最大心率(179)的 88%。你在用<b>阈值的心率,跑恢复的配速</b>。

手表的配速分布更直接:恢复区 90%,阈值区 <b>0%</b>,无氧区 <b>0%</b>。你从来没有练过阈值。

流行的"两极化训练"(80/20)说:大部分轻松,小部分很难。多数业余跑者的错误是全卡在中间的"灰色区"。<b>你的错误相反 —— 你只有慢的那一极,完全没有快的那一极。</b>缺失的那 20% 意味着你的乳酸阈值和最大摄氧量从未被开发过。而因为基础也薄,连"轻松跑"都落在接近阈值的强度上。

这不是意志力问题。这是训练结构里缺了一块。`,
  en:`Your February 2025 half marathon says it all: 7'11"/km pace, average HR 158 — that's 88% of your measured max (179). You were running at <b>threshold heart rate but recovery pace</b>.

The watch's pace distribution is even more direct: 90% in the recovery zone, <b>0%</b> at threshold, <b>0%</b> anaerobic. You have never trained threshold.

Polarized training (80/20) says: mostly easy, some very hard. Most recreational runners get stuck in the moderate "grey zone" in between. <b>Your error is the opposite — you only have the slow pole, no hard pole at all.</b> That missing 20% means your lactate threshold and VO2max were never developed. And because the base is also thin, even your "easy" runs land near threshold effort.

This is not a willpower problem. It's a missing piece of structure.`},
  c:{zh:'<b>Seiler</b> 的两极化训练模型;<b>Stöggl & Sperlich</b>, Frontiers in Physiology (2014) —— 两极化训练在耐力表现的多数关键指标上带来最大改善。',en:'<b>Seiler\'s</b> polarized model; <b>Stöggl & Sperlich</b>, Frontiers in Physiology (2014) — polarized training produced the greatest improvements across most key endurance variables.'}},

 {n:{zh:'为什么前4周不上强度',en:'Why no intensity for 4 weeks'},h:{zh:'你2025年不是练不动,是练一阵停一阵',en:'2025 wasn\'t a lack of effort. It was a lack of continuity'},
  p:{zh:`看你的 2025:2–3月有节奏(每周1–2次,配速稳定在 6'43"–7'00"),4月开始散,之后 7月、8月、9月、11月各一两次,中间大段空白。配速一路退到 7'00"+。

有氧适应(血浆容量、线粒体密度、每搏输出量)在停训 <b>2–4 周</b>内就开始衰退。你每次断档,都在把辛苦建起来的基础清零。

所以第 1 块<b>只有一件事:每周跑 3 次,一次都不能少。</b>全部轻松二区。会觉得太简单 —— 那正是重点。你需要的不是更狠的训练,是<b>不断的训练</b>。

这一块跑完,基础在,再谈强度。`,
  en:`Look at 2025: Feb–Mar had rhythm (1–2 runs/week, steady 6'43"–7'00"). April it fell apart. Then one or two runs each in July, August, September, November — big gaps between. Pace drifted back to 7'00"+.

Aerobic adaptations (plasma volume, mitochondrial density, stroke volume) start decaying within <b>2–4 weeks</b> of stopping. Every gap resets the base you worked to build.

So Block 1 has exactly one job: <b>run 3× a week, every week, without fail.</b> All easy Zone 2. It will feel too easy — that's the point. You don't need harder training. You need <b>uninterrupted</b> training.

Get through this block and the base is there. Then we talk intensity.`},
  c:{zh:'脱训(detraining)研究;急慢性负荷比 —— <b>Gabbett</b>, BJSM。慢性负荷是你的"银行存款",断档就是取空。',en:'Detraining research; acute:chronic workload ratio — <b>Gabbett</b>, BJSM. Chronic load is the bank balance. Gaps empty the account.'}},

 {n:{zh:'为什么大重量、低次数',en:'Why heavy weights, low reps'},h:{zh:'围绝经期改变了训练规则',en:'Perimenopause changes the rules'},
  p:{zh:`雌激素下降会带走三样东西:<b>骨密度、瘦体重、肌腱的胶原</b>。

SWAN 研究(全美女性健康研究)量化了紧迫性:在末次月经前1年到后2年的窗口内,骨量流失约为<b>腰椎每年 2.5%、股骨颈每年 1.8%</b>。

Stacy Sims 的处方很直白:<b>"如果别的都不做,至少要举重物。"</b> 关键是<b>强度,不是容量</b> —— 3–5组、每组 ≤6 次、休息 2 分钟以上。当激素不再帮你,你需要一个足够强的外部信号来募集肌纤维、保住骨和肌肉。

所以你的力量日全是 4×4、4×5、4×6 这种大重量低次数,而不是"三组十二次"的塑形训练。

<b>跳跃收尾</b>也是为骨密度:每天 10–20 跳,16 周就能改善髋部骨密度。`,
  en:`Falling estrogen takes three things: <b>bone density, lean muscle, and tendon collagen</b>.

The SWAN study quantifies the urgency: in the window from one year before to two years after the final period, women lose roughly <b>2.5%/year in the lumbar spine and 1.8%/year at the femoral neck</b>.

Stacy Sims is blunt: <b>"If they do nothing else, they should lift heavy."</b> The key is <b>intensity, not volume</b> — 3–5 sets of ≤6 reps, 2+ min rest. When hormones stop helping you, you need a strong external signal to recruit muscle fibres and hold onto bone and muscle.

That's why every strength day here is 4×4, 4×5, 4×6 — heavy and low-rep — not "3 sets of 12" toning work.

The <b>jump finishers</b> are for bone too: 10–20 jumps a day improved hip BMD in 16 weeks.`},
  c:{zh:'<b>SWAN</b> 骨密度数据;<b>Stacy Sims</b>《Next Level》;<b>Smith-Ryan 等</b>, Menopause (2022) —— 围绝经期女性比绝经前同龄人多约7kg脂肪、少约6kg瘦体重。',en:'<b>SWAN</b> bone data; <b>Stacy Sims</b>, Next Level; <b>Smith-Ryan et al.</b>, Menopause (2022) — perimenopausal women carried ~7kg more fat and ~6kg less lean mass than premenopausal peers.'}},

 {n:{zh:'为什么硬拉配雪橇',en:'Why deadlift → sled'},h:{zh:'力量只有能用出来才算数',en:'Strength only counts if it shows up'},
  p:{zh:`你可以硬拉很重,但如果从来没把它和比赛动作连起来,<b>它在疲劳时就用不出来</b>。

解法是配对:<b>大重量动作 → 休息约2分钟 → 立刻做依赖它的比赛动作</b>。

• 硬拉 → 雪橇拉(后链,水平拉)
• 臀推 → 雪橇推(髋伸,水平推)
• 深蹲 → 墙球(蹲 + 三关节伸展)
• 分腿蹲 → 沙袋弓步

机制有两层:<b>PAPE(赛后激活增强)</b> —— 大重量组让神经系统"预热",随后的动作更有力;以及 <b>动态对应</b> —— 力量动作的发力方向必须匹配比赛动作,否则迁移不过去。

两个实操要点:这个效应<b>在你越强壮时越明显</b>(所以它会随计划推进而放大),而且中间<b>必须休息约 90秒–2分钟</b> —— 让疲劳散掉,把增强留下。`,
  en:`You can deadlift heavy all day, but if you never connect it to the race movement, <b>it won't show up under fatigue</b>.

The fix is pairing: <b>heavy lift → ~2 min rest → immediately do the race movement that depends on it</b>.

• Deadlift → Sled pull (posterior chain, horizontal pull)
• Hip thrust → Sled push (hip extension, horizontal drive)
• Squat → Wall balls (squat + triple extension)
• Split squat → Sandbag lunges

Two mechanisms: <b>PAPE (post-activation performance enhancement)</b> — the heavy set primes the nervous system so the next movement is more powerful; and <b>dynamic correspondence</b> — the force vector of the lift must match the race movement or it won't transfer.

Two practical rules: the effect is <b>bigger the stronger you get</b> (so it grows across the plan), and you <b>must rest ~90s–2min</b> between them — long enough for fatigue to clear, short enough to keep the potentiation.`},
  c:{zh:'<b>PAPE / 复合对比训练</b> meta 分析;<b>Verkhoshansky</b> 的"动态对应"原则。',en:'<b>PAPE / contrast training</b> meta-analyses; <b>Verkhoshansky\'s</b> principle of dynamic correspondence.'}},

 {n:{zh:'为什么跑步和力量要分开',en:'Why runs and lifts are separated'},h:{zh:'周五是你最重要的一天',en:'Friday is your most important day'},
  p:{zh:`同时练力量和耐力会互相削弱 —— 这叫<b>干扰效应</b>。而且<b>跑步的干扰比骑车更大</b>(离心负荷造成更多肌肉损伤),受影响最重的是爆发力和力量增长。

干扰会随<b>时间间隔</b>缩小:至少 6 小时,最好隔一天。

你的时间表(周二四力量、周三普拉提+拳击)其实很好排:

• <b>周一</b> 轻松跑 —— 离周二力量隔一夜
• <b>周五</b> 高质量跑 —— <b>这是全周最重要的一天</b>。离周四力量隔一夜,跑步状态最好。你人生第一次阈值课就在这里。
• <b>周六</b> 长跑或砖式

周三(普拉提+拳击)已经是中等强度日 —— <b>别再往上叠东西</b>。拳击的心率会进灰色区,它就是你那天的"硬"训练。`,
  en:`Training strength and endurance together blunts both — the <b>interference effect</b>. And <b>running interferes more than cycling</b> (eccentric loading, more muscle damage), hitting power and strength gains hardest.

Interference shrinks with <b>time separation</b>: minimum 6 hours, ideally a different day.

Your schedule (Tue/Thu strength, Wed Pilates+boxing) actually lays out well:

• <b>Monday</b> easy run — a night's separation from Tuesday's lift
• <b>Friday</b> quality run — <b>the most important day of your week</b>. A night after Thursday's lift, freshest running legs. Your first-ever threshold session lives here.
• <b>Saturday</b> long run or brick

Wednesday (Pilates + boxing) is already a moderate day — <b>don't stack anything on it</b>. Boxing pushes HR into the grey zone; that IS your hard bit that day.`},
  c:{zh:'<b>Hickson</b> (1980) 首次发现干扰效应;<b>Wilson 等</b>, JSCR (2012) meta 分析确认,并指出干扰程度取决于模式、频率和时长。',en:'<b>Hickson</b> (1980) first identified interference; <b>Wilson et al.</b>, JSCR (2012) meta-analysis confirmed it and showed the degree depends on modality, frequency and duration.'}},

 {n:{zh:'为什么跟腱要"加负荷"而不是拉伸',en:'Why we load the Achilles, not stretch it'},h:{zh:'你的踝背屈受限正在偷走跑步经济性',en:'Your ankle mobility is stealing running economy'},
  p:{zh:`高效跑步大约需要 <b>20° 的踝背屈</b>。小腿紧的人可能只有 <b>−5°</b>。

代价是双重的:步幅变短、触地时间变长、制动力增加(<b>经济性变差</b>);同时代偿性过度内旋,<b>跟腱病风险上升</b>。

而围绝经期让这件事更急:雌激素下降会减少 I 型胶原合成,<b>肌腱变弱、变僵、愈合更慢</b>。

所以处方不是"多拉伸",是<b>给组织加负荷</b>:
• <b>大重量慢速抗阻(HSR)提踵</b> —— 3秒上/3秒下,逐步加到 6–8RM。屈膝(比目鱼肌)和直膝(腓肠肌)都要练。
• 膝碰墙背屈松动 —— 每天,在末端角度上用力
• 台阶慢速离心提踵

研究显示 HSR 和经典的 Alfredson 离心方案<b>效果一样好,但 HSR 的依从性和满意度更高</b> —— 所以我把它放进你每个下肢力量日的收尾。

另外:<b>跳跃训练平均能改善跑步经济性 4.4%</b>(更硬的肌腱 = 更好的弹性回收)。这就是为什么周四有跳跃收尾。`,
  en:`Efficient running needs roughly <b>20° of ankle dorsiflexion</b>. With tight calves you might have <b>−5°</b>.

The cost is double: shorter stride, longer ground contact, more braking force (<b>worse economy</b>) — plus compensatory overpronation and <b>higher Achilles tendinopathy risk</b>.

Perimenopause makes it urgent: falling estrogen reduces type-I collagen synthesis, so <b>tendons get weaker, stiffer, and heal slower</b>.

So the prescription isn't "stretch more" — it's <b>load the tissue</b>:
• <b>Heavy Slow Resistance (HSR) calf raises</b> — 3s up / 3s down, progressing to 6–8RM. Both bent-knee (soleus) and straight-knee (gastroc).
• Knee-to-wall dorsiflexion mobilisation — daily, real effort at end range
• Slow eccentric heel drops off a step

Research shows HSR and the classic Alfredson eccentric protocol work <b>equally well, but HSR has better adherence and satisfaction</b> — so it's the finisher on every lower-body day.

Also: <b>plyometrics improve running economy by ~4.4% on average</b> (stiffer tendons = better elastic return). That's why Thursday ends with jumps.`},
  c:{zh:'<b>Beyer 等</b>, AJSM (2015) —— HSR vs 离心训练;<b>Berryman 等</b>, IJSPP (2018) 13:57–64 —— 跳跃训练平均改善跑步经济性 4.4%。',en:'<b>Beyer et al.</b>, AJSM (2015) — HSR vs eccentric; <b>Berryman et al.</b>, IJSPP (2018) 13:57–64 — plyometrics improve RE by 4.4% on average.'}},

 {n:{zh:'为什么必须减量',en:'Why the taper is non-negotiable'},h:{zh:'"3周伤病悬崖"的真实解释',en:'What the "3-week injury cliff" actually is'},
  p:{zh:`你发我的那组图说:赛前 3–4 周女性开始崩 —— 软组织发炎、膝髋疼、小毛病变成真伤。它把原因归给"女性生物力学"。

<b>真实的解释更简单,而且不分性别:急慢性负荷比(ACWR)。</b>

伤病风险随<b>负荷骤增</b>而上升。赛前恐慌性加量 —— "还没练够,再冲一把" —— 正好把急性负荷推到远超慢性基础的位置。那不是运气不好,是可预测的物理后果。

所以:
• 每 4 周一个<b>减量周</b>(第4、8、14、20周)
• 最后 2 周<b>砍量 40–50%,但保持强度</b>(保神经和摄氧的锐度)
• 最后一次高强度在赛前 <b>约 7 天</b>
• 比赛周只有抖动跑

<b>比赛周你会觉得练太少、心里发痒。忍住。</b> 那种"我该再练一次"的冲动,正是把人送进伤病悬崖的东西。

围绝经期的肌腱适应更慢 —— 这条纪律对你比对别人更重要。`,
  en:`Those slides you sent say women break down 3–4 weeks out — soft tissue flares, knees and hips inflame, niggles become real pain. They blame "female biomechanics."

<b>The real explanation is simpler, and it isn't sex-specific: the acute:chronic workload ratio.</b>

Injury risk rises with <b>spikes in load</b>. Panic-training before a race — "I haven't done enough, let me cram" — pushes acute load far above the chronic base. That's not bad luck. It's a predictable physical consequence.

So:
• A <b>deload week</b> every 4th week (weeks 4, 8, 14, 20)
• Final 2 weeks: <b>cut volume 40–50%, keep intensity</b> (preserves neural drive and VO2 sharpness)
• Last hard session ~<b>7 days out</b>
• Race week is shakeouts only

<b>During race week it will feel like too little and you'll itch to add one more session. Don't.</b> That exact urge is what drives people off the injury cliff.

Perimenopausal tendons adapt more slowly — this discipline matters more for you than for most.`},
  c:{zh:'<b>Gabbett</b>, BJSM —— 急慢性负荷比(注:该模型有学界批评,是参考而非公式);减量研究 —— 砍容量、保强度。',en:'<b>Gabbett</b>, BJSM — acute:chronic workload ratio (note: the model has published critics; it\'s a guide, not a formula); taper literature — cut volume, hold intensity.'}}
];

function renderWhy(){
  const zh=LANG==='zh';
  document.getElementById('v-why').innerHTML=`
  <div class="warn">${zh?'<b>这份计划的每一个决定都有理由。</b>如果哪一天你觉得"这也太轻了"或"为什么要这样练",答案在下面。理解为什么练,比照着练更容易坚持 —— 这也是你2025年缺的东西。':'<b>Every decision in this plan has a reason.</b> If a session feels too easy, or you wonder why it\'s built this way, the answer is below. Understanding why beats blindly following — and that understanding is what 2025 was missing.'}</div>
  ${WHY.map(w=>`<div class="why"><div class="n">${w.n[LANG]}</div><h3>${w.h[LANG]}</h3>
    ${w.p[LANG].split('\n\n').map(x=>`<p>${x}</p>`).join('')}
    <div class="cite">${zh?'依据:':'Source: '}${w.c[LANG]}</div></div>`).join('')}
  <div class="note">${zh?'诚实说明:围绝经期的应用型训练建议(尤其 Stacy Sims 的具体数字)混合了同行评审研究与专家实践,不同访谈里数字会有出入。大重量、低次数、短冲刺、为骨而跳的<b>原则</b>是一致的;把具体数字当起点,按身体反应调。ACWR 模型也有学界批评 —— 它是参考,不是公式。':'Honest note: applied perimenopause training advice (especially Sims\' specific numbers) blends peer-reviewed research with expert practice, and her exact figures vary across interviews. The <b>principles</b> — heavy, low-rep, short sprints, jump for bone — are consistent. Treat the numbers as starting points and auto-regulate. The ACWR model also has published critics; it\'s a guide, not a formula.'}</div>`;
}

/* ---------- log modal ---------- */
let curKey=null;
function openLog(key){
  curKey=key;
  const [w,i]=key.split('-').map(Number);
  const d=PLAN[w-1].days[i][LANG]||{};
  document.getElementById('m-t').textContent=d.t||'';
  document.getElementById('m-s').textContent=`${NAMES[ME]} · W${w} ${t('wd')[i]} · ${fmt(dateOf(w,i))}`;
  const l=DB.logs[`${ME}|${key}`]||{};
  ['km','min','pace','hr','load','rpe','note'].forEach(k=>document.getElementById('f-'+k).value=l[k]||'');

/* ---- image helpers: iPhone HEIC etc -> JPEG, so the API always accepts it ---- */
function toJpeg(file){
  return new Promise((res,rej)=>{
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{
      // Downscale big phone screenshots: faster upload, still readable.
      const MAX=1600;
      let {width:w,height:h}=img;
      if(Math.max(w,h)>MAX){const s=MAX/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      const ctx=c.getContext('2d');
      ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);
      ctx.drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      const d=c.toDataURL('image/jpeg',0.85);
      const b64=d.split(',')[1];
      if(!b64)return rej(new Error('could not read image'));
      res(b64);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);rej(new Error('unsupported image format'));};
    img.src=url;
  });
}

async function askClaude(b64,prompt){
  const r=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:[
      {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
      {type:"text",text:prompt}
    ]}]})});
  const data=await r.json();
  if(!r.ok||data.error){
    const msg=(data.error&&(data.error.message||data.error))||('HTTP '+r.status);
    throw new Error(typeof msg==='string'?msg:JSON.stringify(msg));
  }
  if(!data.content)throw new Error('empty response');
  let txt=data.content.filter(c=>c.type==='text').map(c=>c.text).join('').replace(/```json|```/g,'').trim();
  const a=txt.indexOf('{'),b=txt.lastIndexOf('}');
  if(a<0||b<0)throw new Error('no JSON in response');
  return JSON.parse(txt.slice(a,b+1));
}

// Targets for 60kg. Training-day intensity drives carb needs.

function dayLoad(w,i){
  if(w<1||w>21)return 'easy';
  const d=PLAN[w-1].days[i];
  if(d.k==='rest')return 'rest';
  if(d.k==='move')return 'easy';
  if(d.k==='lift')return 'mod';
  // runs: Friday quality + Saturday long/brick are hard
  if(i===4||i===5)return 'hard';
  return 'mod';
}

  easy:{kcal:[1800,2000],carb:[220,300],pro:[110,130],fat:[55,70]},

      <b>${zh?'训练后(保留这一餐)':'Post-workout (keep this one)'}</b><br>${zh?'希腊酸奶200g + 莓果100g + 麦片40g + 酒酿50g':'Greek yogurt 200g + berries 100g + granola 40g + jiuniang 50g'}<br><br>
      <b>${zh?'晚餐':'Dinner'}</b><br>${zh?'<b>1碗米饭或米粉</b> + 三文鱼/虾/豆腐 150–200g + 蔬菜 + 少量油':'<b>1 bowl rice or noodles</b> + salmon/shrimp/tofu 150–200g + greens + a little oil'}
    </div>
    <div class="note">${zh?'贯穿一切的一句话:<b>别再把主食剩下。</b>训练日晚餐必须有碳水,不能只有三文鱼。':'The one rule: <b>stop leaving the staple.</b> A training-day dinner must have carbs — not salmon alone.'}</div>
  </div>

  <div class="panel">
    <h2>${zh?'该查的三个指标':'Three things to test'}</h2>
    <div style="font-size:16px;line-height:1.9">
      <b>${zh?'1. 铁蛋白(ferritin)— 最优先':'1. Ferritin — do this first'}</b><br>
      ${zh?'近一半女性跑者铁缺乏。铁低会直接压住你的心率和耐力。<30 µg/L 算缺乏(耐力运动员常用 40–50 的界值)。<b>别在跑完后马上抽血</b>(会假性升高)。':'Nearly half of female runners are iron-deficient. Low iron directly caps your HR response and endurance. <30 µg/L = deficient (endurance athletes often use 40–50). <b>Don\'t test right after a run</b> — it falsely elevates.'}<br><br>
      <b>${zh?'2. 维生素D + 钙':'2. Vitamin D + calcium'}</b><br>
      ${zh?'围绝经期骨量在流失,你又在做冲击训练。钙 1000–1200mg/天。':'Bone is being lost in perimenopause and you\'re doing impact work. Calcium 1000–1200mg/day.'}<br><br>
      <b>${zh?'3. 补剂(可选,低风险)':'3. Supplements (optional, low risk)'}</b><br>
      ${zh?'肌酸 3–5g/天 · 胶原10–15g + 维C 50mg(跳跃/提踵前45分钟)':'Creatine 3–5g/day · Collagen 10–15g + vit C 50mg, 45min before jumps/calf work'}
    </div>
  </div>`;
}

/* ---- meal modal ---- */
let curMeal=null;
function openMeal(w,i,key){
  curMeal=key||`${ME}|${w}-${i}|${Date.now()}`;
  const zh=LANG==='zh';
  document.getElementById('fm-t').textContent=zh?'记录一餐':'Log a meal';
  document.getElementById('fm-s').textContent=`${NAMES[ME]} · ${fmt(dateOf(w,i))}`;
  const m=(DB.meals||{})[curMeal]||{};
  ['desc','kcal','carb','pro','fat'].forEach(k=>{const e=document.getElementById('n-'+k);if(e)e.value=m[k]||'';});
  document.getElementById('fdrop-t').textContent=zh?'📸 拍下这餐,自动估算营养':'📸 Photo this meal — auto-estimate';
  document.getElementById('fdrop-s').textContent=zh?'点击选择食物照片':'Tap to choose a food photo';
  document.getElementById('fdrop').classList.remove('busy');
  document.getElementById('fm-del').style.display=(DB.meals||{})[curMeal]?'block':'none';
  document.getElementById('fm-x').textContent=zh?'取消':'Cancel';
  document.getElementById('fm-ok').textContent=zh?'保存':'Save';
  document.getElementById('fm-del').textContent=zh?'删除':'Delete';
  document.getElementById('fl-desc').textContent=zh?'吃了什么':'What you ate';
  document.getElementById('fl-kcal').textContent=zh?'热量 kcal':'Energy kcal';
  document.getElementById('fl-carb').textContent=zh?'碳水 g':'Carbs g';
  document.getElementById('fl-pro').textContent=zh?'蛋白质 g':'Protein g';
  document.getElementById('fl-fat').textContent=zh?'脂肪 g':'Fat g';
  document.getElementById('fmask').classList.add('on');
}
function editMeal(key){
  const p=key.split('|')[1].split('-').map(Number);
  openMeal(p[0],p[1],key);
}
document.getElementById('fm-x').onclick=()=>document.getElementById('fmask').classList.remove('on');
document.getElementById('fmask').onclick=e=>{if(e.target.id==='fmask')document.getElementById('fmask').classList.remove('on');};
document.getElementById('fm-ok').onclick=async()=>{
  const m={};['desc','kcal','carb','pro','fat'].forEach(k=>{const v=document.getElementById('n-'+k).value.trim();if(v)m[k]=v;});
  if(Object.keys(m).length){DB.meals=DB.meals||{};DB.meals[curMeal]=m;}
  await persist();document.getElementById('fmask').classList.remove('on');renderFood();
};
document.getElementById('fm-del').onclick=async()=>{
  if(!confirm(LANG==='zh'?'删除这一餐?':'Delete this meal?'))return;
  delete DB.meals[curMeal];await persist();
  document.getElementById('fmask').classList.remove('on');renderFood();
};

/* ---- food photo -> macros (multi-dish, HEIC-safe, totals up) ---- */
document.getElementById('fdrop').onclick=()=>document.getElementById('ffile').click();
document.getElementById('ffile').onchange=async e=>{
  const files=[...e.target.files];if(!files.length)return;
  const drop=document.getElementById('fdrop');drop.classList.add('busy');
  const zh=LANG==='zh';
  busyOn(zh?'正在估算营养':'Estimating nutrition', zh?'准备图片…':'Preparing image…');
  let ok=0,lastErr='';
  const sum={kcal:0,carb:0,pro:0,fat:0},descs=[];
  for(let n=0;n<files.length;n++){
    busyStep(15+(n/files.length)*70, zh?`压缩第 ${n+1}/${files.length} 张…`:`Compressing ${n+1}/${files.length}…`);
    try{
      const b64=await toJpeg(files[n]);
      busyStep(25+(n/files.length)*70, zh?`AI 正在看第 ${n+1}/${files.length} 道菜…`:`AI reading dish ${n+1}/${files.length}…`);
      const o=await askClaude(b64,`Photo of a meal, likely Chinese/Asian food (rice, rice noodles, congee, salmon sashimi, shrimp, tofu, greens, Greek yogurt, tremella soup, jiuniang/fermented rice, toast, fruit).

Estimate the nutrition of what is shown. Return ONLY raw JSON, no markdown:
{"desc":"1 bowl rice + salmon sashimi ~150g + broccoli","kcal":"650","carb":"85","pro":"35","fat":"18"}

Rules:
- desc = short description with estimated portions
- carb = carbohydrate in grams. BE ACCURATE — this is the most important number.
- Reference: 1 standard bowl cooked rice (~200g) is about 55g carbs. 1 slice toast ~15g carbs. 1 banana ~27g carbs.
- If the plate has little or no staple/starch, say so in desc and give a low carb number honestly.
- Estimate portions from the photo. Always give your best estimate; never return empty.
JSON only.`);
      sum.kcal+=+o.kcal||0; sum.carb+=+o.carb||0; sum.pro+=+o.pro||0; sum.fat+=+o.fat||0;
      if(o.desc)descs.push(o.desc);
      ok++;
    }catch(err){lastErr=err.message||String(err);}
  }
  busyOff();
  if(ok){
    // Add to whatever is already typed in, so several photos build one meal.
    const add=(id,v)=>{const el=document.getElementById(id);const cur=+el.value||0;el.value=Math.round(cur+v);};
    add('n-kcal',sum.kcal);add('n-carb',sum.carb);add('n-pro',sum.pro);add('n-fat',sum.fat);
    const d=document.getElementById('n-desc');
    const joined=descs.join(' + ');
    d.value=d.value?d.value+' + '+joined:joined;
    document.getElementById('fdrop-t').textContent=zh?`✓ 估算了 ${ok}/${files.length} 张 — 核对一下`:`✓ Estimated ${ok}/${files.length} — check it`;
    document.getElementById('fdrop-s').textContent=zh?'可以再拍一道菜,会自动累加':'Add another dish — it totals up';
  }else{
    document.getElementById('fdrop-t').textContent=zh?'✕ 估算失败':'✕ Could not estimate';
    document.getElementById('fdrop-s').textContent=lastErr?(zh?'原因: ':'Reason: ')+lastErr:(zh?'手动填一下':'Fill it in manually');
  }
  drop.classList.remove('busy');e.target.value='';
};

  document.querySelectorAll('nav>button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
